server:
  port: ${port:8081}
  shutdown: GRACEFUL

spring:
  application:
    name: data-emitter
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

logging:
  level:
    root: INFO
    data.emitter: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"

websocket:
  configuration:
    uri: ws://localhost:8080
    reconnect-timeout: 1000

scheduler:
  connect-auto: false
  close-cron: "0 0 16 * * MON-FRI"
  open-cron: "0 0 9 * * MON-FRI"
