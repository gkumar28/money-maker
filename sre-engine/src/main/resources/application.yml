server:
  port: ${PORT:8082}
  shutdown: GRACEFUL

spring:
  application:
    name: sre-engine
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/money_maker
    username: gauravkumar
    password: Gauravk@25
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

logging:
  level:
    root: INFO
    sre.engine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"

strategy:
  definitions:
    home: 'classpath:strategies/'

bar:
  time-frame: 60

service:
  broker-integrator:
    url: ${BROKER_INTEGRATOR_URL:http://localhost:8080}
