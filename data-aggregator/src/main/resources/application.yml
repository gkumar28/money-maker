server:
  port: ${port:8082}
  shutdown: GRACEFUL

spring:
  application:
    name: data-aggregator
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

logging:
  level:
    root: INFO
    data.aggregator: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"

scheduler:
  task-cron: "0 * * * * MON-FRI"
  task-cron-interval: 60 # seconds
