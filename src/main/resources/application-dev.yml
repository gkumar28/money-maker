server:
  port: 8081
  shutdown: GRACEFUL

spring:
  application:
    name: money-maker

logging:
  level:
    root: INFO
    money.maker: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"

websocket:
  configuration:
    uri: ws://localhost:8082
    reconnect-timeout: 3000

candle:
  aggregation-period: 30
  ma:
    frame-count-long: 200
    frame-count-short: 50
  rsi:
    frame-count: 14

scheduler:
  connect-auto: true
  task-cron: "0 * * * * ?"
  pool-size: 5

dev:
  enable: true
  websocket:
    server:
      port: 8082
