name: Build and Tag All Application
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        service:
          - name: broker-integrator
            port: 8080
          - name: data-aggregator
            port: 8081
          - name: data-emitter
            port: 8082
          - name: execution-engine
            port: 8083
          - name: strategy-engine
            port: 8084


    steps:
      - name: init log
        run: |
          echo "Starting build process for ${{ matrix.service.name }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Get app name
        id : get_name
        run: |
          APP_NAME=$(./gradlew -q -p ${{ matrix.service.name }} printName)
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Get app version
        id: get_version
        run: |
          APP_VERSION=$(./gradlew -q -p ${{ matrix.service.name }} printVersion)
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: login to Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}

      - name: Log in to Docker Hub
        if: steps.check_tag.outputs.version_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check tag exists
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$APP_NAME-v$APP_VERSION"; then
            echo "Version exists: skipping tag creation"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed: creating new tag"
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build fat JAR
        run: ./gradlew -p ${{ matrix.service.name }} clean bootJar

      - name: Build Docker image
        if: steps.check_tag.outputs.version_changed == 'true'
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
          PORT: ${{ matrix.service.port }}
        run: |
          docker build --platform=linux/amd64 \
            --build-arg APP_NAME=$APP_NAME \
            --build-arg APP_VERSION=$APP_VERSION \
            --build-arg PORT=$PORT \
            -t ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:v$APP_VERSION \
            -t ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest .

      - name: Push Docker image
        if: steps.check_tag.outputs.version_changed == 'true'
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:v$APP_VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest

      - name: Create and push new Git tag
        if: steps.check_tag.outputs.version_changed == 'true'
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        run: |
          echo "Creating and pushing tag $APP_NAME-v$APP_VERSION"
          git tag "$APP_NAME-v$APP_VERSION"
          git push origin "$APP_NAME-v$APP_VERSION"