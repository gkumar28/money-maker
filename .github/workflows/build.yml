name: Build and Deploy Spring Boot App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build fat JAR
        run: ./gradlew clean bootJar

      - name: Get app name
        id : get_name
        run: |
          APP_NAME=$(./gradlew -q printName)
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Get app version
        id: get_version
        run: |
          APP_VERSION=$(./gradlew -q printVersion)
          echo "app_version=v$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Get latest Git tag
        id: get_latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Compare version with latest tag
        id: compare_versions
        env:
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
          LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
        run: |
          echo "App version: $APP_VERSION"
          echo "Latest tag: $LATEST_TAG"

          if [ "$APP_VERSION" != "$LATEST_TAG" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: creating new tag"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: skipping tag creation"
          fi
          
      - name: Create and push new Git tag
        if: steps.compare_versions.outputs.version_changed == 'true'
        env:
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        run: |
          echo "Creating and pushing tag $APP_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git tag "$APP_VERSION"
          git push origin "$APP_VERSION"

      - name: Log in to Docker Hub
        if: steps.compare_versions.outputs.version_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        if: steps.compare_versions.outputs.version_changed == 'true'
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        run: |
          docker build --platform=linux/amd64 \
            --build-arg APP_NAME=$APP_NAME \
            --build-arg APP_VERSION=$APP_VERSION \
            -t ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION .

      - name: Push Docker image
        if: steps.compare_versions.outputs.version_changed == 'true'
        env:
          APP_NAME: ${{ steps.get_name.outputs.app_name }}
          APP_VERSION: ${{ steps.get_version.outputs.app_version }}
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION

      #- name: Trigger deploy on Render
      #  env:
      #    RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      #  if: steps.compare_versions.outputs.version_changed == 'true'
      # run: curl -X POST "$RENDER_DEPLOY_HOOK&imgURL=docker.io