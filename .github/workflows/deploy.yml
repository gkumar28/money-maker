name: Deploy Application if new tag found
on:
  push:
    tags:
      - 'broker-integrator-v*' # for now deploying only broker-integrator

permissions:
  actions: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Extract service and version from tag
        id: tag
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          SERVICE="${TAG_NAME%%-v*}"        
          VERSION="${TAG_NAME##*-v}"        
          echo "Service: $SERVICE"
          echo "Version: $VERSION"
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy service
        env:
          SERVICE: ${{ steps.tag.outputs.service }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          get-service-id() {
            case "$1" in
            broker-integrator) echo "svc_abc123" ;;
            *)
            echo "Error: Unknown service '$1'" >&2
            exit 1
            ;;
            esac
          }
          
          echo "Deploying Docker image: $SERVICE:latest"
          docker pull viper52/$SERVICE:latest
          railway up --service=$(get-service-id $SERVICE)