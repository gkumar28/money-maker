name: Deploy Application
on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      RAILWAY_TOKEN:
        required: true

permissions:
  actions: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Railway Service ID
        id: get_svc_id
        env:
          SERVICE: ${{ inputs.service }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ "$SERVICE" = "broker-integrator" ]; then
            echo "svc_id=da4439d2-96c5-4428-ab83-6c487720a6b1" >> $GITHUB_OUTPUT
          else
            echo "svc_id=" >> $GITHUB_OUTPUT
          fi
        
      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        if: steps.get_svc_id.outputs.svc_id != ''
        env:
          SVC_ID: ${{ steps.get_svc_id.outputs.svc_id }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service=$SVC_ID