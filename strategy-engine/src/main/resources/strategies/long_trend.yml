name: Long Trend Strategy
interval: minute
delay: 50
entry:
  _deftype: LOGICAL
  rule_type: AND
  left:
    _deftype: LEAF
    rule_type: OVER_INDICATOR
    indicator_definitions:
      - type: CLOSE_PRICE
      - type: CONSTANT
        parameters:
          value: 1000.0
  right:
    _deftype: LOGICAL
    rule_type: NOT
    left:
      _deftype: LEAF
      rule_type: IS_EQUAL
      parameters:
        threshold: 30
      indicator_definitions:
        - type: RSI
          parameters:
            bar_count: 14
          inputs:
            - type: CLOSE_PRICE
