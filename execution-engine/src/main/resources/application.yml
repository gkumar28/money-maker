server:
  port: ${port:8083}
  shutdown: GRACEFUL

spring:
  application:
    name: execution-engine
  datasource:
    url: jdbc:postgresql://localhost:5432/money_maker
    username: gauravkumar
    password: Gauravk@25
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

logging:
  level:
    root: INFO
    execution.engine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"