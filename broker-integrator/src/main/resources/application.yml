server:
  port: ${PORT:8080}
  shutdown: GRACEFUL

spring:
  application:
    name: broker-integrator
  datasource:
    url: ${POSTGRES_DB_URL:jdbc:postgresql://localhost:5432/money_maker}
    username: ${POSTGRES_USERNAME:gauravkumar}
    password: ${POSTGRES_PASSWORD:Gauravk@25}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}


management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

logging:
  level:
    root: INFO
    data.aggregator: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%logger{simple}] - %msg%n"

