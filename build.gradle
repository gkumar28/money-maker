plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.5'
    id 'io.spring.dependency-management' version '1.1.4'
}

group = 'com.trade.bot'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '17' // or 21 if using latest JDK

repositories {
    mavenCentral()
}

ext {
    set('springCloudVersion', '2023.0.2')
    set('springBootVersion', '3.2.5')
    set('camelVersion', '4.3.0')
}

dependencies {
    // Spring Boot Core
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // websocket
    implementation 'org.java-websocket:Java-WebSocket:1.5.4'

    // camel
    implementation 'org.apache.camel.springboot:camel-spring-boot-starter'

    // JSON parsing
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.core:jackson-core'

    // guava cache
    implementation 'com.google.guava:guava:33.0.0-jre'

    // lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // For technical analysis
    implementation 'org.ta4j:ta4j-core:0.17'
    implementation("org.ejml:ejml-all:0.41")

    // WebSocket Client (for Zerodha tick data)
    implementation 'org.java-websocket:Java-WebSocket:1.5.3'

    // REST client (Zerodha Kite order placement)
    implementation 'org.springframework.boot:spring-boot-starter-webflux' // includes WebClient

    // Email alerting (optional)
    implementation 'org.springframework.boot:spring-boot-starter-mail'

    // Database (optional - H2 or PostgreSQL)
    runtimeOnly 'com.h2database:h2'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // common
    implementation 'org.apache.commons:commons-lang3:3.18.0'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        mavenBom "org.apache.camel.springboot:camel-spring-boot-bom:${camelVersion}"
    }
}

test {
    useJUnitPlatform()
}
